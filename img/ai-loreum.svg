<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="300" fill="black"/>
  
  <!-- Main Planet Body -->
  <circle cx="200" cy="150" r="60" fill="white"/>
  
  <!-- Ring System -->
  <path d="M100 150 A100 30 0 0 1 300 150" stroke="white" fill="none" stroke-width="4"/>
  <path d="M100 150 A100 30 0 0 0 300 150" stroke="white" fill="none" stroke-width="4"/>
  
  <!-- Central Power Node -->
  <circle cx="200" cy="150" r="12" fill="black"/>
  
  <!-- Secondary Power Nodes -->
  <circle cx="170" cy="130" r="8" fill="black"/>
  <circle cx="230" cy="130" r="8" fill="black"/>
  <circle cx="170" cy="170" r="8" fill="black"/>
  <circle cx="230" cy="170" r="8" fill="black"/>
  
  <!-- Connecting Lines -->
  <line x1="200" y1="150" x2="170" y2="130" stroke="black" stroke-width="3"/>
  <line x1="200" y1="150" x2="230" y2="130" stroke="black" stroke-width="3"/>
  <line x1="200" y1="150" x2="170" y2="170" stroke="black" stroke-width="3"/>
  <line x1="200" y1="150" x2="230" y2="170" stroke="black" stroke-width="3"/>
</svg>
